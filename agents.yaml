settings:
    app_name: agents
    debug: false
    default_user_id: default
    storage:
        backend: sqlite
        postgres_dsn: ${AGENT_POSTGRES_DSN}
        db_path: ./data/agent.sqlite3
        sessions_dir: ./data/sessions
    api:
        host: 127.0.0.1
        port: 8000
        reload: false
        cors:
            origins: ""
            allow_credentials: false
            allow_methods: "*"
            allow_headers: "*"
        stream:
            # false: 仅输出 `data: {...}`，不输出 `event: ...`
            include_event_name: false
            # false: 流式阶段不重复发送最终 assistant_message
            include_assistant_message: false

llms:
    - name: qwen3.6-plus
      model: qwen3.6-plus
      api_key: ${API_KEY}
      base_url: https://coding.dashscope.aliyuncs.com/v1

tools:
    - name: calculator
      provider: agents.tools.calculator.CalculatorToolProvider
      config: {}

agents:
    - name: default
      llm: qwen3.6-plus
      tools:
          - calculator
      system_prompt: |
          所有的回复末尾都必须加上🆗表情。
      include_builtin_tools: true
      skills: true
      memory: true
